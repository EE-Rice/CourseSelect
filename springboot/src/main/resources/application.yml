# ============================================
# Spring Boot 服务器配置
# ============================================
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ============================================
# 数据库连接配置
# ============================================
spring:
  datasource:
    url: jdbc:mysql://192.168.139.3:3306/course_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ============================================
  # 文件上传配置（Spring Boot内置）
  # ============================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

# ============================================
# MyBatis-Plus 配置
# ============================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-prefix: ""

# ============================================
# 自定义文件上传配置（我们自己定义的）
# 通过 @Value("${upload.path}") 在代码中读取
# ============================================
upload:
  path: ./uploads
  avatar-path: ./uploads/avatar
  file-path: ./uploads/files
  allowed-types: image/jpeg,image/png,image/gif,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
  max-size: 10485760